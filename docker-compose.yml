services:
  postgres:
    image: postgis/postgis:15-3.4
    container_name: somos-r-db
    environment:
      POSTGRES_DB: somos_r_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d somos_r_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
