services:
  postgres:
    image: postgis/postgis:15-3.4
    container_name: somos-r-db
    environment:
      POSTGRES_DB: somos_r_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d somos_r_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - somos-r-network

# pgAdmin (Opcional - Interfaz gráfica para ver la DB)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: somos-r-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@somosr.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - somos-r-network
  
  # Nuestro servicio (Backend)
  app:
    build: .  # Indica que use el Dockerfile, es decir se define la ruta
    container_name: somos-r-backend
    volumes:
      - .:/app  # Sincroniza tu código para ver cambios en tiempo real
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/somos_r_dev
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - somos-r-network
    # AQUÍ es donde usas poetry para arrancar el servidor uvicorn
    command: poetry run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:

networks:
  somos-r-network:
    driver: bridge
